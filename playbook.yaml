- name: First play
  hosts: http
  vars_files:
    - secrets/secret.yaml
    - group_vars/servers.yaml
  roles:
    - geerlingguy.docker
  tasks:
    - name: copy files
      ansible.builtin.copy:
        src: src/
        dest: /home/ubuntu/options/
        mode: '0777'
        owner: ubuntu
        group: ubuntu
    - name: copy Dockerfiles
      ansible.builtin.copy:
        src: Dockerfiles/
        dest: /home/ubuntu/Dockerfiles/
        mode: '0666'
        owner: ubuntu
        group: ubuntu
    - name: create first image
      community.docker.docker_image:
        name: flask:{{ flask_version }}
        build:
          path: /home/ubuntu/
          dockerfile: Dockerfiles/flask/Dockerfile
        source: build
    - name: create first container
      community.docker.docker_container:
        name: flask
        image: flask:{{ flask_version }}
        state: started
        restart_policy: always
        env:
          MONGO_URI: "{{ URL }}"
          MONGO_DB: "{{ name }}"
        ports:
          - "80:8000"